---
# Grafana datasource provisioning — auto-connects Grafana to the Prometheus
# service running in the same docker-compose network. No manual setup needed.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
