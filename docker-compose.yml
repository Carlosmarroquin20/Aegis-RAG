---
# Development stack: Aegis-RAG API + ChromaDB + Ollama
# For production, replace hardcoded keys with secrets management.

services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - LOG_FORMAT=console
      - LOG_LEVEL=DEBUG
      - VALID_API_KEYS=dev-key-change-in-production
      - SECURITY_STRICT_MODE=true
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      # Mount source for live reload during development.
      - ./src:/app/src:ro
    networks:
      - aegis-net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.6.0
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - aegis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - aegis-net
    # Pull the default model on first startup.
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && wait"]
    restart: unless-stopped

  # ── Observability stack ─────────────────────────────────────────────────────
  # Prometheus scrapes the API /metrics endpoint; Grafana ships with a
  # pre-provisioned dashboard and Prometheus datasource, so `docker compose up`
  # yields a fully working monitoring view at http://localhost:3000.

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - aegis-net
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - aegis-net
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  chroma-data:
  ollama-models:
  prometheus-data:
  grafana-data:

networks:
  aegis-net:
    driver: bridge
